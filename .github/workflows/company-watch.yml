name: Company Job Watch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  schedule:
    - cron: "5,35 * * * *"

concurrency:
  group: company-job-watch
  cancel-in-progress: false

jobs:
  run-watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check Detroit schedule window
        id: schedule_gate
        run: |
          DETROIT_DATE="$(TZ=America/Detroit date +%Y-%m-%d)"
          DETROIT_TIME="$(TZ=America/Detroit date +%H:%M)"
          echo "Detroit date: ${DETROIT_DATE}"
          echo "Detroit time: ${DETROIT_TIME}"
          slot=""
          if [[ "${DETROIT_TIME}" > "08:29" && "${DETROIT_TIME}" < "09:06" ]]; then
            slot="morning"
          elif [[ "${DETROIT_TIME}" > "20:04" && "${DETROIT_TIME}" < "20:36" ]]; then
            slot="evening"
          fi

          if [ -z "${slot}" ]; then
            echo "run_watch=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          last_sent_date="$(python3 -c 'import json, pathlib; p = pathlib.Path("output/company_watch/digest_state.json"); payload = {}; 
if p.exists():
    try:
        payload = json.loads(p.read_text(encoding="utf-8"))
    except json.JSONDecodeError:
        payload = {}
print(payload.get("last_sent_date", ""))')"
          last_sent_slot="$(python3 -c 'import json, pathlib; p = pathlib.Path("output/company_watch/digest_state.json"); payload = {};
if p.exists():
    try:
        payload = json.loads(p.read_text(encoding="utf-8"))
    except json.JSONDecodeError:
        payload = {}
print(payload.get("last_sent_slot", ""))')"

          if [ "${last_sent_date}" = "${DETROIT_DATE}" ] && [ "${last_sent_slot}" = "${slot}" ]; then
            run_watch="false"
          else
            run_watch="true"
          fi

          echo "run_watch=${run_watch}" >> "${GITHUB_OUTPUT}"
          echo "slot=${slot}" >> "${GITHUB_OUTPUT}"
          echo "detroit_date=${DETROIT_DATE}" >> "${GITHUB_OUTPUT}"

      - name: Run company watch
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run_watch == 'true' }}
        env:
          JOB_WATCH_EMAIL_METHOD: smtp
          JOB_WATCH_FROM_ADDRESS: ${{ secrets.JOB_WATCH_FROM_ADDRESS }}
          JOB_WATCH_SMTP_HOST: ${{ secrets.JOB_WATCH_SMTP_HOST }}
          JOB_WATCH_SMTP_PORT: ${{ secrets.JOB_WATCH_SMTP_PORT }}
          JOB_WATCH_SMTP_USERNAME: ${{ secrets.JOB_WATCH_SMTP_USERNAME }}
          JOB_WATCH_SMTP_PASSWORD: ${{ secrets.JOB_WATCH_SMTP_PASSWORD }}
          JOB_WATCH_SMTP_USE_SSL: ${{ secrets.JOB_WATCH_SMTP_USE_SSL }}
          JOB_WATCH_OLLAMA_ENABLED: "false"
        run: |
          python3 "${{ github.workspace }}/scripts/company_job_watch.py" \
            --config "${{ github.workspace }}/config/company_watch.json"

      - name: Upload latest outputs
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: company-watch-latest
          path: |
            output/company_watch/latest_summary.md
            output/company_watch/latest_report.md
            output/company_watch/latest_results.json
            output/company_watch/collected_jobs.json
            output/company_watch/digest_state.json
            output/company_watch/state.json
          if-no-files-found: ignore

      - name: Persist company watch state
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run_watch == 'true' }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            mkdir -p output/company_watch
            python3 -c 'import datetime, json, os, pathlib; path = pathlib.Path("output/company_watch/digest_state.json"); payload = {"last_sent_date": os.environ["DIGEST_STATE_DATE"], "last_sent_slot": os.environ["DIGEST_STATE_SLOT"], "sent_at": datetime.datetime.now(datetime.timezone.utc).isoformat(timespec="seconds")}; path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")'
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/company_watch/state.json output/company_watch/digest_state.json
          if git diff --cached --quiet; then
            echo "No company watch state changes to commit."
            exit 0
          fi
          git commit -m "chore: update company watch state"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
        env:
          DIGEST_STATE_DATE: ${{ steps.schedule_gate.outputs.detroit_date }}
          DIGEST_STATE_SLOT: ${{ steps.schedule_gate.outputs.slot }}
