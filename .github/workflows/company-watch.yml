name: Company Job Watch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  schedule:
    - cron: "5,35 * * * *"

concurrency:
  group: company-job-watch
  cancel-in-progress: false

jobs:
  run-watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check Detroit schedule window
        id: schedule_gate
        run: |
          export DETROIT_DATE="$(TZ=America/Detroit date +%Y-%m-%d)"
          export DETROIT_TIME="$(TZ=America/Detroit date +%H:%M)"
          echo "Detroit date: ${DETROIT_DATE}"
          echo "Detroit time: ${DETROIT_TIME}"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          detroit_date = os.environ["DETROIT_DATE"]
          detroit_time = os.environ["DETROIT_TIME"]

          slot = ""
          if "08:30" <= detroit_time <= "09:05":
              slot = "morning"
          elif "20:05" <= detroit_time <= "20:35":
              slot = "evening"

          if not slot:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
                  handle.write("run_watch=false\n")
              raise SystemExit(0)

          state_path = Path("output/company_watch/digest_state.json")
          last_sent_date = ""
          last_sent_slot = ""
          if state_path.exists():
              try:
                  payload = json.loads(state_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  payload = {}
              last_sent_date = str(payload.get("last_sent_date", ""))
              last_sent_slot = str(payload.get("last_sent_slot", ""))

          run_watch = not (last_sent_date == detroit_date and last_sent_slot == slot)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"run_watch={'true' if run_watch else 'false'}\n")
              handle.write(f"slot={slot}\n")
              handle.write(f"detroit_date={detroit_date}\n")
          PY

      - name: Run company watch
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run_watch == 'true' }}
        env:
          JOB_WATCH_EMAIL_METHOD: smtp
          JOB_WATCH_FROM_ADDRESS: ${{ secrets.JOB_WATCH_FROM_ADDRESS }}
          JOB_WATCH_SMTP_HOST: ${{ secrets.JOB_WATCH_SMTP_HOST }}
          JOB_WATCH_SMTP_PORT: ${{ secrets.JOB_WATCH_SMTP_PORT }}
          JOB_WATCH_SMTP_USERNAME: ${{ secrets.JOB_WATCH_SMTP_USERNAME }}
          JOB_WATCH_SMTP_PASSWORD: ${{ secrets.JOB_WATCH_SMTP_PASSWORD }}
          JOB_WATCH_SMTP_USE_SSL: ${{ secrets.JOB_WATCH_SMTP_USE_SSL }}
          JOB_WATCH_OLLAMA_ENABLED: "false"
        run: |
          python3 "${{ github.workspace }}/scripts/company_job_watch.py" \
            --config "${{ github.workspace }}/config/company_watch.json"

      - name: Upload latest outputs
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: company-watch-latest
          path: |
            output/company_watch/latest_summary.md
            output/company_watch/latest_report.md
            output/company_watch/latest_results.json
            output/company_watch/collected_jobs.json
            output/company_watch/digest_state.json
            output/company_watch/state.json
          if-no-files-found: ignore

      - name: Persist company watch state
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run_watch == 'true' }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            python3 - <<'PY'
            import json
            import os
            from pathlib import Path

            path = Path("output/company_watch/digest_state.json")
            path.parent.mkdir(parents=True, exist_ok=True)
            payload = {
                "last_sent_date": os.environ["DIGEST_STATE_DATE"],
                "last_sent_slot": os.environ["DIGEST_STATE_SLOT"],
                "sent_at": __import__("datetime").datetime.now(__import__("datetime").timezone.utc).isoformat(timespec="seconds"),
            }
            path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
            PY
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/company_watch/state.json output/company_watch/digest_state.json
          if git diff --cached --quiet; then
            echo "No company watch state changes to commit."
            exit 0
          fi
          git commit -m "chore: update company watch state"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
        env:
          DIGEST_STATE_DATE: ${{ steps.schedule_gate.outputs.detroit_date }}
          DIGEST_STATE_SLOT: ${{ steps.schedule_gate.outputs.slot }}
